name: Profile Automation Agents

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-automation
  cancel-in-progress: false

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate GitHub activity summary
        run: |
          python scripts/fetch_github_activity.py \
            --username "${{ github.repository_owner }}" \
            --output data/activity_summary.json \
            --window-days 7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate profile README
        run: |
          python scripts/generate_readme.py \
            --profile data/profile.json \
            --activity data/activity_summary.json \
            --output README.md

      - name: Generate LinkedIn draft
        run: |
          python scripts/generate_linkedin_draft.py \
            --profile data/profile.json \
            --activity data/activity_summary.json \
            --output linkedin_drafts/latest.md

      - name: Validate generated outputs
        run: |
          python scripts/validate_outputs.py \
            --readme README.md \
            --linkedin-draft linkedin_drafts/latest.md

      - name: Upload LinkedIn draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-draft
          path: linkedin_drafts/latest.md
          retention-days: 30

      - name: Commit updated outputs
        run: |
          if git diff --quiet -- README.md data/activity_summary.json linkedin_drafts/latest.md; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/activity_summary.json linkedin_drafts/latest.md
          git commit -m "chore: refresh profile and linkedin automation outputs"
          git push

      - name: Notify on failure (optional webhook)
        if: failure() && secrets.FAILURE_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST "${{ secrets.FAILURE_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text":"Profile automation workflow failed. Review run logs for details."}'

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Profile Automation Run"
            echo "- Generated README from structured profile + GitHub activity"
            echo "- Generated LinkedIn draft artifact for human review"
            echo "- Optional publish workflow requires explicit manual trigger"
          } >> "$GITHUB_STEP_SUMMARY"
